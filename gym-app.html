<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DietApp">
<meta name="description" content="La tua app dieta personale">
<link rel="manifest" href="/gymtracker/manifest.json">
<title>🍽️ DietApp</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #16213e;
  --inner: #12121f;
  --primary: #FF6B35;
  --secondary: #4ECDC4;
  --success: #4CAF50;
  --danger: #e74c3c;
  --text: #f0f0f0;
  --muted: #888;
  --border: #2a2a3e;
  --col-col: #FFB347;
  --col-pra: #4ECDC4;
  --col-cen: #9B59B6;
  --col-sna: #2ECC71;
  --nav-h: 64px;
  --radius: 14px;
}
[data-theme="light"] {
  --bg: #fafafa;
  --card: #ffffff;
  --card2: #f5f5f5;
  --inner: #eeeeee;
  --text: #1a1a1a;
  --muted: #666;
  --border: #e0e0e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input{font-family:inherit;}
</style>
</head>
<body>
<div id="pin-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;">
  <div style="font-size:3rem;">🍽️</div>
  <div style="font-size:1.5rem;font-weight:700;color:var(--primary);">DietApp</div>
  <div style="font-size:.9rem;color:var(--muted);">Inserisci il PIN</div>
  <div id="pin-dots" style="display:flex;gap:16px;"></div>
  <div id="pin-grid" style="display:grid;grid-template-columns:repeat(3,72px);gap:12px;"></div>
  <div id="pin-error" style="color:#e74c3c;font-size:.85rem;opacity:0;transition:opacity .3s;">PIN errato</div>
</div>

<div id="app" style="display:none;height:100%;display:flex;flex-direction:column;overflow:hidden;">
  <div id="content" style="flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 8px);"></div>
  <nav id="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;">
    <button class="nav-btn" data-tab="piano" onclick="showTab('piano')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--muted);font-size:.65rem;min-height:44px;transition:color .2s;">
      <span style="font-size:1.4rem;">📅</span><span>Piano</span>
    </button>
    <button class="nav-btn" data-tab="ricette" onclick="showTab('ricette')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--muted);font-size:.65rem;min-height:44px;transition:color .2s;">
      <span style="font-size:1.4rem;">🍽️</span><span>Ricette</span>
    </button>
    <button class="nav-btn" data-tab="spesa" onclick="showTab('spesa')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--muted);font-size:.65rem;min-height:44px;transition:color .2s;">
      <span style="font-size:1.4rem;">🛒</span><span>Spesa</span>
    </button>
    <button class="nav-btn" data-tab="preferiti" onclick="showTab('preferiti')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--muted);font-size:.65rem;min-height:44px;transition:color .2s;">
      <span style="font-size:1.4rem;">❤️</span><span>Preferiti</span>
    </button>
    <button class="nav-btn" data-tab="impostazioni" onclick="showTab('impostazioni')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--muted);font-size:.65rem;min-height:44px;transition:color .2s;">
      <span style="font-size:1.4rem;">⚙️</span><span>Impostazioni</span>
    </button>
  </nav>
</div>
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;backdrop-filter:blur(4px);" onclick="closeModal()"></div>
<div id="modal-container" style="display:none;position:fixed;inset:0;z-index:501;overflow-y:auto;pointer-events:none;"></div>

<style>
.nav-btn.active{color:var(--primary)!important;}
.nav-btn.active span:first-child{transform:scale(1.15);display:inline-block;}
.page{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);}
.card2{background:var(--card2);border-radius:var(--radius);}
.section-title{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:12px;}
.chip{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--radius);font-size:.9rem;font-weight:600;min-height:44px;transition:all .2s;cursor:pointer;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:active{transform:scale(.97);filter:brightness(.9);}
.btn-secondary{background:var(--secondary);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;}
.recipe-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;}
.recipe-card:active{transform:scale(.97);}
.recipe-card .emoji{font-size:2.5rem;text-align:center;}
.recipe-card .r-name{font-size:.85rem;font-weight:700;line-height:1.3;}
.recipe-card .r-meta{font-size:.75rem;color:var(--muted);}
.recipe-card .r-cal{font-size:.8rem;font-weight:700;color:var(--primary);}
.diff-badge{font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700;}
.diff-facile{background:#2ECC7133;color:#2ECC71;}
.diff-medio{background:#F39C1233;color:#F39C12;}
.diff-difficile{background:#e74c3c33;color:#e74c3c;}
.fav-btn{position:absolute;top:8px;right:8px;background:none;font-size:1.2rem;min-width:32px;min-height:32px;}
.day-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);min-width:160px;padding:12px;cursor:pointer;transition:border-color .2s;}
.day-card.today{border-color:var(--primary);}
.day-card.active-day{border-color:var(--secondary);}
.slot-item{background:var(--inner);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;min-height:44px;cursor:pointer;}
.slot-add{background:transparent;border:1px dashed var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;min-height:44px;cursor:pointer;color:var(--muted);font-size:1.2rem;width:100%;transition:border-color .2s;}
.slot-add:active,.slot-item:active{opacity:.7;}
.macro-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;gap:2px;}
.macro-bar .p-seg{background:#FF6B35;}
.macro-bar .c-seg{background:#4ECDC4;}
.macro-bar .f-seg{background:#9B59B6;}
.ingredient-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.step-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s;}
.step-row.done .step-text{text-decoration:line-through;opacity:.5;}
.step-num{min-width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;}
.timer-btn{background:var(--secondary);color:#fff;border-radius:8px;padding:4px 10px;font-size:.75rem;font-weight:700;margin-top:4px;}
.grocery-section{margin-bottom:20px;}
.grocery-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.grocery-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--primary);flex-shrink:0;}
.grocery-item.checked label{text-decoration:line-through;color:var(--muted);}
.progress-bar-wrap{height:6px;background:var(--inner);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.settings-label{font-size:.95rem;color:var(--text);}
.settings-sub{font-size:.78rem;color:var(--muted);}
.toggle{position:relative;width:48px;height:26px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:13px;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--primary);}
.toggle input:checked+.toggle-slider:before{transform:translateX(22px);}
.input-field{background:var(--inner);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.95rem;width:100%;}
.input-field:focus{outline:none;border-color:var(--primary);}
select.input-field option{background:var(--card);color:var(--text);}
.category-filter{display:flex;gap:8px;overflow-x:auto;padding:0 16px 8px;scrollbar-width:none;}
.category-filter::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:.8rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted);min-height:36px;transition:all .2s;}
.cat-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.modal-content{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;margin-top:auto;min-height:60vh;max-width:600px;margin-left:auto;margin-right:auto;pointer-events:all;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.full-modal{background:var(--bg);border-radius:0;min-height:100vh;margin-top:0;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto;}
.tag-chip{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:600;background:var(--inner);color:var(--muted);margin:2px;}
.calorie-ring{position:relative;display:flex;align-items:center;justify-content:center;}
.pantry-item{padding:8px 0;border-bottom:1px solid var(--border);color:var(--muted);font-size:.9rem;}
@media(min-width:600px){.recipe-grid{grid-template-columns:1fr 1fr 1fr;}}
</style>

let pinEntry = '';
function setupPin() {
  const stored = localStorage.getItem('dietPin') || '0406';
  const dotsEl = document.getElementById('pin-dots');
  const gridEl = document.getElementById('pin-grid');
  dotsEl.innerHTML = '';
  for (let i=0;i<4;i++) {
    const d = document.createElement('div');
    d.style.cssText='width:16px;height:16px;border-radius:50%;border:2px solid var(--primary);transition:background .2s;';
    d.id='dot'+i;
    dotsEl.appendChild(d);
  }
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.style.cssText='background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);height:64px;font-size:1.4rem;font-weight:700;color:var(--text);min-height:44px;transition:all .15s;';
    btn.textContent = k;
    if (!k) { btn.style.background='transparent'; btn.style.border='none'; }
    else btn.onclick = () => { k === '⌫' ? deletePinDigit() : addPinDigit(k); };
    gridEl.appendChild(btn);
  });
}
function addPinDigit(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(() => {
      const stored = localStorage.getItem('dietPin') || '0406';
      if (pinEntry === stored) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        initApp();
      } else {
        document.getElementById('pin-error').style.opacity = '1';
        setTimeout(() => document.getElementById('pin-error').style.opacity = '0', 1500);
        pinEntry = '';
        updatePinDots();
      }
    }, 200);
  }
}
function deletePinDigit() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
}
function updatePinDots() {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('dot'+i);
    d.style.background = i < pinEntry.length ? 'var(--primary)' : 'transparent';
  }
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function getRecipe(id) { return RECIPES.find(r=>r.id===id); }
function isFavorite(id) { return getFavorites().includes(id); }
function toggleFavorite(id, ev) {

  });

function getMondayOfWeek() {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  mon.setHours(0,0,0,0);
  return mon;
}
function getWeekDays() {
  const mon = getMondayOfWeek();
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    return d;
  });
}
function isToday(date) {
  const t = new Date();
  return date.getDate()===t.getDate() && date.getMonth()===t.getMonth() && date.getFullYear()===t.getFullYear();
}
function dayKey(date) {
  return date.toISOString().split('T')[0];
}
function calcCalories(plan) {
  let cal=0;
  SLOTS.forEach(slot => {
    const rid = plan[slot];
    if (rid) { const r = getRecipe(rid); if(r) cal += r.calories; }
  });
  return cal;
}
function calcMacros(plan) {
  let m={protein:0,carbs:0,fat:0};
  SLOTS.forEach(slot => {
    const rid = plan[slot];
    if (rid) { const r = getRecipe(rid); if(r) {m.protein+=r.macros.protein;m.carbs+=r.macros.carbs;m.fat+=r.macros.fat;} }
  });
  return m;
}

function removeMeal(dk, slot) {
  const plan = getPlan();
  if (!plan[dk]) return;
  delete plan[dk][slot];

function calcMacroTarget() {
  const p = getProfile();
  const w = parseFloat(p.weight) || 70;
  const tdee = calcTDEE();
  // Proteine: 2g/kg, grassi: 1g/kg, resto carboidrati
  const protein = Math.round(w * 2);
  const fat = Math.round(w * 1);
  const carbs = Math.round((tdee - protein * 4 - fat * 9) / 4);
  return { kcal: tdee, protein, carbs: Math.max(carbs, 50), fat };
}

function scoraRicetta(recipe, slotKcalTarget, remainingMacros) {
  // Punteggio basato su kcal + distanza dai macro target residui per slot
  const kcalScore = 1 - Math.min(Math.abs(recipe.calories - slotKcalTarget) / slotKcalTarget, 1);
  const pScore = 1 - Math.min(Math.abs(recipe.macros.protein - remainingMacros.protein) / Math.max(remainingMacros.protein, 1), 1);
  const cScore = 1 - Math.min(Math.abs(recipe.macros.carbs - remainingMacros.carbs) / Math.max(remainingMacros.carbs, 1), 1);
  const fScore = 1 - Math.min(Math.abs(recipe.macros.fat - remainingMacros.fat) / Math.max(remainingMacros.fat, 1), 1);
  // Peso: kcal 40%, proteine 30%, carbo 20%, grassi 10%
  return kcalScore * 0.4 + pScore * 0.3 + cScore * 0.2 + fScore * 0.1;
}

function generaGiornoSmartRicette(target) {
  const macroTarget = calcMacroTarget();
  // Distribuzione kcal per slot
  const pesi = { colazione: 0.25, pranzo: 0.35, cena: 0.30, snack: 0.10 };
  const result = {};
  const remaining = { ...macroTarget };

  SLOTS.forEach(slot => {
    const pool = RECIPES.filter(r => r.category === slot);
    const slotKcal = macroTarget.kcal * pesi[slot];
    const slotMacros = {
      protein: Math.round(macroTarget.protein * pesi[slot]),
      carbs:   Math.round(macroTarget.carbs * pesi[slot]),
      fat:     Math.round(macroTarget.fat * pesi[slot])
    };

    // Calcola punteggio per ogni ricetta del pool
    const scored = pool.map(r => ({
      r,
      score: scoraRicetta(r, slotKcal, slotMacros)
    })).sort((a, b) => b.score - a.score);

    // Prendi le top 3 e scegline una a caso per varietà
    const top = scored.slice(0, Math.min(3, scored.length));
    const chosen = top[Math.floor(Math.random() * top.length)].r;
    result[slot] = chosen.id;

    // Aggiorna i macro residui
    remaining.protein -= chosen.macros.protein;
    remaining.carbs   -= chosen.macros.carbs;
    remaining.fat     -= chosen.macros.fat;
    remaining.kcal    -= chosen.calories;
  });

  return result;
}

function generaSettimana() {
  const plan = getPlan();
  const weekDays = getWeekDays();
  weekDays.forEach(day => {
    const dk = dayKey(day);
    plan[dk] = generaGiornoSmartRicette();
  });
  savePlan(plan);
  renderPiano();
}

function generaGiorno(dk) {
  const plan = getPlan();
  plan[dk] = generaGiornoSmartRicette();
  savePlan(plan);
  renderPiano();
}

// ─── TIMER FEATURE ────────────────────────────────────────────────────────────
function startTimer(rid, stepIdx, seconds) {
  const key = `${rid}-${stepIdx}`;
  if (state.activeTimers[key]) {
    clearInterval(state.activeTimers[key].interval);
    delete state.activeTimers[key];
  }
  const endTime = Date.now() + seconds*1000;
  const stepRow = document.getElementById(`step-${rid}-${stepIdx}`);
  const btn = stepRow ? stepRow.querySelector('.timer-btn') : null;

  const interval = setInterval(() => {
    const remaining = Math.ceil((endTime - Date.now())/1000);
    if (remaining <= 0) {
      clearInterval(interval);
      delete state.activeTimers[key];
      if (btn) btn.textContent = '✅ Tempo scaduto!';
      if (navigator.vibrate) navigator.vibrate([400,100,400]);
      alert('⏰ Timer completato!');
      return;
    }
    const m = Math.floor(remaining/60);
    const s = remaining%60;
    if (btn) btn.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
  }, 500);

  state.activeTimers[key] = {interval};
  if (btn) btn.textContent = `⏱ ${Math.floor(seconds/60)}:00`;
}

  'carboidrati': ['riso','pasta','pane','avena','quinoa','patate','granola','piadina','farina','lenticchie','ceci','fiocchi','pan grattato'],
  'verdure': ['broccoli','spinaci','zucchine','peperone','peperoni','pomodori','pomodorino','carote','sedano','cipolla','rucola','lattuga','funghi','cetriolo','mais','insalata'],
  'frutta': ['banana','fragole','frutti di bosco','avocado','limone','mela','uvetta','lamponi','mirtilli'],
  'latticini': ['latte','yogurt','ricotta','feta','parmigiano','grana','mozzarella','formaggio','burro'],
  'condimenti': ['olio','aceto','miele','sale','pepe','paprika','curcuma','cannella','origano','rosmarino','timo','basilico','prezzemolo','aglio','tahini','burro di arachidi','vino','brodo']
};
const CAT_LABELS = {
  'proteine':'🥩 Proteine',
  'carboidrati':'🌾 Carboidrati',
  'verdure':'🥦 Verdure',
  'frutta':'🍎 Frutta',
  'latticini':'🧀 Latticini',
  'condimenti':'🧴 Condimenti',
  'altro':'📦 Altro'
};
const PANTRY = ['Olio EVO','Sale','Pepe','Aglio','Cipolla','Olio di cocco','Aceto balsamico','Salsa di pomodoro','Brodo vegetale','Spezie miste'];

function categorizIngredient(name) {
  const n = name.toLowerCase();
  for (const [cat, keywords] of Object.entries(INGREDIENT_CATEGORIES)) {
    if (keywords.some(k => n.includes(k))) return cat;
  }
  return 'altro';
}

function aggregateIngredients() {
  const plan = getPlan();
  const map = {};
  Object.values(plan).forEach(dp => {
    SLOTS.forEach(slot => {
      const rid = dp[slot];
      if (!rid) return;
      const r = getRecipe(rid);
      if (!r) return;
      r.ingredients.forEach(ing => {
        const key = ing.name.toLowerCase().trim();
        if (!map[key]) map[key] = {name:ing.name, amount:0, unit:ing.unit, cat:categorizIngredient(ing.name)};
        if (map[key].unit === ing.unit) {
          map[key].amount += ing.amount;
        }
      });
    });
  });
  const grouped = {};
  Object.values(map).forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });
  return grouped;
}

// ─── IMPOSTAZIONI ─────────────────────────────────────────────────────────────
function calcTDEE() {
  const p = getProfile();
  const w = parseFloat(p.weight)||70, h = parseFloat(p.height)||175, a = parseFloat(p.age)||30;
  // Mifflin-St Jeor (assuming male for simplicity; user can adjust)
  const bmr = 10*w + 6.25*h - 5*a + 5; // male formula
  const activity = 1.55; // moderately active
  let tdee = Math.round(bmr * activity);
  if (p.goal === 'dimagrimento') tdee -= 300;
  if (p.goal === 'massa') tdee += 300;
  return tdee;
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">Nome</div>
        <input class="input-field" id="prof-name" type="text" placeholder="Il tuo nome" value="${esc(p.name||'')}" onchange="saveProfileField('name',this.value)">
      </div>
      <div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">Età</div>
        <input class="input-field" id="prof-age" type="number" min="10" max="100" value="${p.age}" onchange="saveProfileField('age',+this.value)">
      </div>
      <div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">Peso (kg)</div>
        <input class="input-field" id="prof-weight" type="number" min="30" max="250" step="0.1" value="${p.weight}" onchange="saveProfileField('weight',+this.value)">
      </div>
      <div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">Altezza (cm)</div>
        <input class="input-field" id="prof-height" type="number" min="100" max="250" value="${p.height}" onchange="saveProfileField('height',+this.value)">
      </div>
    </div>
    <div style="margin-top:12px;">
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">Obiettivo</div>
      <select class="input-field" onchange="saveProfileField('goal',this.value)">
        <option value="dimagrimento" ${p.goal==='dimagrimento'?'selected':''}>💪 Dimagrimento</option>
        <option value="mantenimento" ${p.goal==='mantenimento'?'selected':''}>⚖️ Mantenimento</option>
        <option value="massa" ${p.goal==='massa'?'selected':''}>🏋️ Aumento massa</option>
      </select>
    </div>
    <div class="card2" style="padding:14px;margin-top:14px;text-align:center;border-radius:var(--radius);">
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">Fabbisogno calorico stimato</div>
      <div style="font-size:2rem;font-weight:800;color:var(--primary);" id="tdee-display">${tdee}</div>
      <div style="font-size:.75rem;color:var(--muted);">kcal / giorno</div>
    </div>
  </div>

  <!-- DIETA -->
  <div style="font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--primary);">🥗 Preferenze Dieta</div>
  <div class="card" style="padding:16px;margin-bottom:20px;">
    <div class="settings-row">
      <div><div class="settings-label">Senza glutine</div></div>
      <label class="toggle"><input type="checkbox" ${p.gluten?'checked':''} onchange="saveProfileField('gluten',this.checked)"><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-row">
      <div><div class="settings-label">Vegetariano</div></div>
      <label class="toggle"><input type="checkbox" ${p.vegetarian?'checked':''} onchange="saveProfileField('vegetarian',this.checked)"><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-row">
      <div><div class="settings-label">Vegano</div></div>
      <label class="toggle"><input type="checkbox" ${p.vegan?'checked':''} onchange="saveProfileField('vegan',this.checked)"><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-row" style="border-bottom:none;">
      <div><div class="settings-label">Senza lattosio</div></div>
      <label class="toggle"><input type="checkbox" ${p.lactose?'checked':''} onchange="saveProfileField('lactose',this.checked)"><span class="toggle-slider"></span></label>
    </div>
  </div>

  <!-- TEMA -->
  <div style="font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--primary);">🎨 Aspetto</div>
  <div class="card" style="padding:16px;margin-bottom:20px;">
    <div class="settings-row" style="border-bottom:none;">
      <div><div class="settings-label">Tema chiaro</div><div class="settings-sub">Attiva la modalità light</div></div>
      <label class="toggle"><input type="checkbox" id="theme-toggle" ${theme==='light'?'checked':''} onchange="toggleTheme()"><span class="toggle-slider"></span></label>
    </div>
  </div>

  <!-- PIN -->
  <div style="font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--primary);">🔐 Sicurezza</div>
  <div class="card" style="padding:16px;margin-bottom:20px;">
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:12px;">Cambia il PIN di accesso (4 cifre)</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <input class="input-field" id="pin-cur" type="password" maxlength="4" inputmode="numeric" placeholder="PIN attuale">
      <input class="input-field" id="pin-new" type="password" maxlength="4" inputmode="numeric" placeholder="Nuovo PIN">
      <input class="input-field" id="pin-con" type="password" maxlength="4" inputmode="numeric" placeholder="Conferma nuovo PIN">
      <button class="btn btn-primary" onclick="changePin()">Aggiorna PIN</button>
      <div id="pin-change-msg" style="font-size:.8rem;text-align:center;"></div>
    </div>
  </div>

  <!-- BACKUP -->
  <div style="font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--primary);">💾 Backup Dati</div>
  <div class="card" style="padding:16px;margin-bottom:20px;">
    <div style="display:flex;gap:12px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="exportData()">📤 Esporta JSON</button>
      <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('import-file').click()">📥 Importa JSON</button>
      <input id="import-file" type="file" accept=".json" style="display:none;" onchange="importData(this)">
    </div>
  </div>

  <!-- INFO -->
  <div class="card2" style="padding:16px;text-align:center;border-radius:var(--radius);margin-bottom:8px;">
    <div style="font-size:1.5rem;margin-bottom:8px;">🍽️</div>
    <div style="font-weight:700;font-size:1rem;">DietApp v1.0</div>
    <div style="font-size:.8rem;color:var(--muted);margin-top:4px;">La tua app dieta personale<br>Tutti i dati salvati localmente</div>
  </div>

  </div>`;
  content.innerHTML = html;
}

function saveProfileField(field, value) {
  const p = getProfile();
  p[field] = value;
  saveProfile(p);
  const tdeeEl = document.getElementById('tdee-display');
  if (tdeeEl) tdeeEl.textContent = calcTDEE();
}

function changePin() {
  const cur = document.getElementById('pin-cur').value;
  const newp = document.getElementById('pin-new').value;
  const con = document.getElementById('pin-con').value;
  const msg = document.getElementById('pin-change-msg');
  const stored = localStorage.getItem('dietPin') || '0406';
  if (cur !== stored) { msg.style.color='var(--danger)'; msg.textContent='PIN attuale errato.'; return; }
  if (!/^\d{4}$/.test(newp)) { msg.style.color='var(--danger)'; msg.textContent='Il PIN deve essere di 4 cifre.'; return; }
  if (newp !== con) { msg.style.color='var(--danger)'; msg.textContent='I PIN non coincidono.'; return; }
  localStorage.setItem('dietPin', newp);
  msg.style.color='var(--success)'; msg.textContent='PIN aggiornato con successo!';
  ['pin-cur','pin-new','pin-con'].forEach(id => document.getElementById(id).value='');
}

function exportData() {
  const data = {
    plan: loadData('dietPlan',{}),
    favorites: loadData('dietFavorites',[]),
    profile: loadData('dietProfile',{}),
    groceryChecked: loadData('groceryChecked',{})
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dietapp-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.plan) saveData('dietPlan', data.plan);
      if (data.favorites) saveData('dietFavorites', data.favorites);
      if (data.profile) saveData('dietProfile', data.profile);
      if (data.groceryChecked) saveData('groceryChecked', data.groceryChecked);
      alert('Dati importati con successo!');
      renderImpostazioni();
    } catch { alert('File non valido.'); }
  };
  reader.readAsText(file);
}


// ─── MODAL SYSTEM ─────────────────────────────────────────────────────────────
function showModal(html) {
  const overlay = document.getElementById('modal-overlay');
  const container = document.getElementById('modal-container');
  overlay.style.display = 'block';
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.justifyContent = 'flex-end';
  container.innerHTML = html;
  // Scroll to top of full-modal
  setTimeout(() => {
    const fm = container.querySelector('.full-modal');
    if (fm) { fm.scrollTop = 0; container.style.justifyContent='flex-start'; }
  }, 10);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('modal-container').style.display = 'none';
  document.getElementById('modal-container').innerHTML = '';
}

// Close modal on back gesture / escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initApp() {
  applyTheme();
  showTab('piano');
  // register SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/gymtracker/sw.js').catch(()=>{});
  }
}

// Boot
document.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  setupPin();
});

</script>
</body>
</html>
